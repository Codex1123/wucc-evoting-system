<!DOCTYPE html>
<!-- admin/index.html
     The admin panel lives inside index.html as #page-admin (SPA architecture).
     This file redirects directly to it and calls showPage('admin').
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>WUCC Admin Panel</title>
  <script>
    // Redirect to the SPA and open admin page
    window.location.replace('../index.html#admin');
  </script>
</head>
<body>
  <p style="font-family:sans-serif;color:#64748b;padding:2rem;text-align:center">
    Redirecting to WUCC Admin Panel...
  </p>
</body>
</html>
